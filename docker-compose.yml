# App-only compose file.
#
# For the full local demo stack with Grafana, Prometheus, and fake metrics, use:
#   docker compose -f docker-compose.dev.yml up -d
#
# The dev stack intentionally uses unsafe Grafana demo defaults and must stay
# local-only. This file does not start Grafana with anonymous Editor access.

services:
  tacit:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    volumes:
      - tacit_data:/app/data
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  tacit_data:
