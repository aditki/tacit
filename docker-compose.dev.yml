# DEV-ONLY compose stack for local demos.
#
# This stack intentionally enables anonymous Grafana Editor access and uses
# admin/admin so a local demo can run without setup friction. Do not expose this
# stack to the internet or use it for production/private-beta deployments.

services:
  # ── Grafana (local dev) ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: "none"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dev/grafana/provisioning:/etc/grafana/provisioning

  # ── Fake app (metric source for testing) ─────────────────────────────
  fake-app:
    build: ./dev/fake_app
    ports:
      - "9091:9091"

  # ── Prometheus (local dev) ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./dev/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    depends_on:
      - fake-app

  # Historical/imported metrics for real-dataset evaluation. Grafana sees this
  # through its standard Prometheus datasource API.
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.144.0
    ports:
      - "8428:8428"
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=30d"
    volumes:
      - victoriametrics_data:/victoria-metrics-data

  # M1 accepts metrics only. Logs and traces are added in the multimodal milestone.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    ports:
      - "4318:4318"
    volumes:
      - ./dev/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
    depends_on:
      - victoriametrics

  # Isolated GAMMA evaluation surface. It sees only the imported GAMMA
  # datasource, so synthetic demo metrics cannot satisfy a test accidentally.
  gamma-grafana:
    profiles: ["gamma"]
    image: grafana/grafana-oss:11.1.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
    volumes:
      - gamma_grafana_data:/var/lib/grafana
      - ./dev/gamma-grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - victoriametrics

  gamma-tacit:
    profiles: ["gamma"]
    build: .
    ports:
      - "8001:8000"
    env_file:
      - path: .env
        required: false
    environment:
      GRAFANA_URL: http://gamma-grafana:3000
      SSL_CERT_FILE: ""
      LEARNING_AUTO_REGISTER_ARCHETYPE: "true"
      TACIT_ARCHETYPES_PATH: /app/data/gamma-archetypes.yaml
    volumes:
      - gamma_tacit_data:/app/data
    depends_on:
      - gamma-grafana
      - victoriametrics

  # ── Tacit ─────────────────────────────────────────────────────────
  tacit:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      GRAFANA_URL: http://grafana:3000
      SSL_CERT_FILE: ""
      # The demo intentionally proves the review -> reuse loop in one session.
      LEARNING_AUTO_REGISTER_ARCHETYPE: "true"
      TACIT_ARCHETYPES_PATH: /app/data/demo-archetypes.yaml
    volumes:
      - tacit_data:/app/data
    depends_on:
      - grafana
      - prometheus
      - victoriametrics
    # Uncomment below if using something like ollama on the host and want to access it from the container
    # extra_hosts:
    #  - "host.docker.internal:host-gateway" # use "http://host.docker.internal:11434" in .env for LLM_API_BASE

volumes:
  tacit_data:
  grafana_data:
  victoriametrics_data:
  gamma_tacit_data:
  gamma_grafana_data:
