    tags: [step-functions, workflows, orchestration]
    default_timerange: "4h"
    panels:
      - title: Execution Outcomes
        row: Executions
        unit: short
        queries:
          - expr: 'sum(rate(stepfunctions_execution_succeeded[{rate_interval}]))'
            legend_format: succeeded
          - expr: 'sum(rate(stepfunctions_execution_failed[{rate_interval}]))'
            legend_format: failed
          - expr: 'sum(rate(stepfunctions_execution_timed_out[{rate_interval}]))'
            legend_format: timed out
      - title: Failure Rate
        row: Executions
        unit: percentunit
        queries:
          - expr: 'sum(rate(stepfunctions_execution_failed[{rate_interval}])) / (sum(rate(stepfunctions_execution_succeeded[{rate_interval}])) + sum(rate(stepfunctions_execution_failed[{rate_interval}])))'
            legend_format: failure ratio
      - title: Execution Duration
        row: Latency
        unit: s
        queries:
          - expr: 'histogram_quantile(0.95, sum(rate(stepfunctions_execution_duration_seconds_bucket[{rate_interval}])) by (le))'
            legend_format: p95
      - title: Running Executions
        row: Concurrency
        unit: short
        queries:
          - expr: 'stepfunctions_executions_running'
            legend_format: running

  - id: sqs_investigation
    name: SQS Queue Investigation
    description: Diagnose SQS backlog growth, delayed processing, and DLQ spikes
    problem_types:
      - sqs_queue_depth
      - delayed_messages
      - dead_letter_queue_growth
      - consumer_lag
    required_metrics:
      - aws_sqs_approximate_number_of_messages_visible
      - aws_sqs_number_of_messages_deleted
      - aws_sqs_approximate_age_of_oldest_message
    tags: [sqs, queues, async]
    default_timerange: "4h"
    panels:
      - title: Messages Visible (Queue Depth)
        row: Queue
        unit: short
        queries:
          - expr: 'aws_sqs_approximate_number_of_messages_visible_average{{{service_filter}}}'
            legend_format: "{{queue_name}}"
      - title: Oldest Message Age
        row: Queue
        unit: s
        queries:
          - expr: 'aws_sqs_approximate_age_of_oldest_message_maximum{{{service_filter}}}'
            legend_format: "{{queue_name}}"
      - title: Messages Processed
        row: Throughput
        unit: short
        queries:
          - expr: 'aws_sqs_number_of_messages_deleted_sum{{{service_filter}}}'
            legend_format: "deleted {{queue_name}}"
          - expr: 'aws_sqs_number_of_messages_sent_sum{{{service_filter}}}'
            legend_format: "sent {{queue_name}}"
      - title: Dead Letter Queue Depth
        row: DLQ
        unit: short
        queries:
          - expr: 'aws_sqs_approximate_number_of_messages_visible_average{{queue_name=~".*-dlq.*"}}'
            legend_format: "{{queue_name}}"

  - id: emr_pipeline_investigation
    name: EMR & Data Pipeline Investigation
    description: Diagnose Spark job failures, slow stages, and EMR cluster instability
    problem_types:
      - spark_job_failures
      - emr_cluster_instability
      - slow_spark_stages
      - pipeline_delays
    required_metrics:
      - spark_executor_cpu_time
      - spark_stage_duration_seconds
      - emr_cluster_memory_available
      - failed_jobs_total
    tags: [emr, spark, pipelines, big-data]
    default_timerange: "12h"
    panels:
      - title: Spark Stage Duration
        row: Spark
        unit: s
        queries:
          - expr: 'spark_stage_duration_seconds{{{service_filter}}}'
            legend_format: "stage {{stage_id}}"
      - title: Executor CPU Time
        row: Spark
        unit: s
        queries:
          - expr: 'rate(spark_executor_cpu_time{{{service_filter}}}[{rate_interval}]) / 1e9'
            legend_format: "{{executor_id}}"
      - title: EMR Cluster Memory Available
        row: Cluster
        unit: bytes
        queries:
          - expr: 'emr_cluster_memory_available{{{service_filter}}}'
            legend_format: available
      - title: Failed Jobs
        row: Failures
        unit: short
        queries:
          - expr: 'sum(increase(failed_jobs_total{{{service_filter}}}[{rate_interval}])) by (job_name)'
            legend_format: "{{job_name}}"

  - id: kafka_broker_health
    name: Kafka Broker Health Investigation
    description: Diagnose broker instability, under-replicated partitions, ISR shrinks, and disk pressure
    problem_types:
      - kafka_broker_failure
      - under_replicated_partitions
      - isr_shrink
      - kafka_disk_pressure
      - kafka_leader_election
    required_metrics:
      - kafka_server_replicamanager_underreplicatedpartitions
      - kafka_server_replicamanager_isrshrinks_total
      - kafka_server_brokertopicmetrics_messagesin_total
      - kafka_log_log_size
    tags: [kafka, broker, replication]
    default_timerange: "2h"
    panels:
      - title: Under-Replicated Partitions
        row: Replication
        unit: short
        queries:
          - expr: 'kafka_server_replicamanager_underreplicatedpartitions'
            legend_format: "broker {{instance}}"
      - title: ISR Shrink / Expand Rate
        row: Replication
        unit: short
        queries:
          - expr: 'rate(kafka_server_replicamanager_isrshrinks_total[{rate_interval}])'
            legend_format: "shrinks {{instance}}"
          - expr: 'rate(kafka_server_replicamanager_isrexpands_total[{rate_interval}])'
            legend_format: "expands {{instance}}"
      - title: Offline Partitions
        row: Replication
        unit: short
        queries:
          - expr: 'kafka_controller_kafkacontroller_offlinepartitionscount'
            legend_format: offline partitions
      - title: Log Size per Broker
        row: Storage
        unit: bytes
        queries:
          - expr: 'sum(kafka_log_log_size) by (instance)'
            legend_format: "{{instance}}"
      - title: Active Controller Count
        row: Cluster
        unit: short
        queries:
          - expr: 'kafka_controller_kafkacontroller_activecontrollercount'
            legend_format: active controllers
      - title: Broker Network Request Rate
        row: Network
        unit: reqps
        queries:
          - expr: 'sum(rate(kafka_network_requestmetrics_requests_total[{rate_interval}])) by (instance,request)'
            legend_format: "{{instance}} {{request}}"

  - id: kafka_consumer_group_issues
    name: Kafka Consumer Group Investigation
    description: Diagnose consumer rebalancing storms, commit lag, partition assignment skew, and stuck consumers
    problem_types:
      - kafka_rebalancing
      - consumer_group_lag
      - partition_skew
      - stuck_consumers
      - kafka_commit_failures
    required_metrics:
      - kafka_consumergroup_lag
      - kafka_consumergroup_members
      - kafka_consumer_fetch_manager_records_lag
    tags: [kafka, consumer, rebalancing]
    default_timerange: "2h"
    panels:
      - title: Consumer Group Lag by Topic
        row: Lag
        unit: short
        queries:
          - expr: 'sum(kafka_consumergroup_lag{{{service_filter}}}) by (topic,consumergroup)'
            legend_format: "{{consumergroup}} / {{topic}}"
      - title: Consumer Group Lag by Partition
        row: Lag
        unit: short
        queries:
          - expr: 'kafka_consumergroup_lag{{{service_filter}}}'
            legend_format: "{{topic}}-{{partition}}"
      - title: Consumer Group Members
        row: Group
        unit: short
        queries:
          - expr: 'kafka_consumergroup_members{{{service_filter}}}'
            legend_format: "{{consumergroup}}"
      - title: Records Consumed Rate
        row: Throughput
        unit: reqps
        queries:
          - expr: 'sum(rate(kafka_consumer_fetch_manager_records_consumed_total{{{service_filter}}}[{rate_interval}])) by (consumergroup)'
            legend_format: "{{consumergroup}}"
      - title: Fetch Latency
        row: Latency
        unit: s
        queries:
          - expr: 'kafka_consumer_fetch_manager_fetch_latency_avg{{{service_filter}}} / 1000'
            legend_format: "{{consumergroup}}"

  - id: kafka_producer_failures
    name: Kafka Producer Failures Investigation
    description: Diagnose producer send failures, high retry rates, batch timeouts, and record error spikes
    problem_types:
      - kafka_producer_errors
      - kafka_send_failures
      - kafka_producer_retries
      - kafka_batch_timeout
    required_metrics:
      - kafka_producer_record_error_total
      - kafka_producer_record_send_total
      - kafka_producer_request_latency_avg
    tags: [kafka, producer, reliability]
    default_timerange: "2h"
    panels:
      - title: Record Send Rate
        row: Throughput
        unit: reqps
        queries:
          - expr: 'sum(rate(kafka_producer_record_send_total{{{service_filter}}}[{rate_interval}])) by (topic)'
            legend_format: "{{topic}}"
      - title: Record Error Rate
        row: Errors
        unit: reqps
        queries:
          - expr: 'sum(rate(kafka_producer_record_error_total{{{service_filter}}}[{rate_interval}])) by (topic)'
            legend_format: "{{topic}}"
      - title: Error Ratio
        row: Errors
        unit: percentunit
        queries:
          - expr: 'sum(rate(kafka_producer_record_error_total{{{service_filter}}}[{rate_interval}])) / sum(rate(kafka_producer_record_send_total{{{service_filter}}}[{rate_interval}]))'
            legend_format: error ratio
      - title: Producer Request Latency
        row: Latency
        unit: s
        queries:
          - expr: 'kafka_producer_request_latency_avg{{{service_filter}}} / 1000'
            legend_format: "avg {{client_id}}"
      - title: Retry Rate
        row: Retries
        unit: reqps
        queries:
          - expr: 'sum(rate(kafka_producer_record_retry_total{{{service_filter}}}[{rate_interval}])) by (topic)'
            legend_format: "{{topic}}"
      - title: Batch Size
        row: Batching
        unit: bytes
        queries:
          - expr: 'kafka_producer_batch_size_avg{{{service_filter}}}'
            legend_format: "avg {{client_id}}"

  - id: kafka_connect_streams_failures
    name: Kafka Connect & Streams Failures Investigation
    description: Diagnose connector task failures, stream processing lag, rebalancing, and dead letter routing
    problem_types:
      - kafka_connect_failure
      - connector_task_failure
      - kafka_streams_lag
      - kafka_streams_rebalancing
    required_metrics:
      - kafka_connect_connector_status
      - kafka_connect_task_status
      - kafka_streams_process_latency
    tags: [kafka, connect, streams, connectors]
    default_timerange: "4h"
    panels:
      - title: Connector Status
        row: Connectors
        unit: short
        queries:
          - expr: 'kafka_connect_connector_status{{{service_filter}}}'
            legend_format: "{{connector}} ({{status}})"
      - title: Failed Tasks
        row: Connectors
        unit: short
        queries:
          - expr: 'kafka_connect_task_status{{status="failed",{service_filter}}}'
            legend_format: "{{connector}}/{{task}}"
      - title: Connector Error Rate
        row: Errors
        unit: reqps
        queries:
          - expr: 'sum(rate(kafka_connect_connector_total_record_errors{{{service_filter}}}[{rate_interval}])) by (connector)'
            legend_format: "{{connector}}"
      - title: Streams Process Latency
        row: Streams
        unit: s
        queries:
          - expr: 'kafka_streams_process_latency_avg{{{service_filter}}} / 1000'
            legend_format: "{{application_id}}"
      - title: Streams Records Processed Rate
        row: Streams
        unit: reqps
        queries:
          - expr: 'sum(rate(kafka_streams_process_total{{{service_filter}}}[{rate_interval}])) by (application_id)'
            legend_format: "{{application_id}}"

  - id: kafka_topic_throughput
    name: Kafka Topic Throughput & Partition Analysis
    description: Diagnose per-topic throughput imbalances, partition hotspots, and message size anomalies
    problem_types:
      - kafka_topic_imbalance
      - kafka_partition_hotspot
      - kafka_throughput_drop
      - kafka_message_size_spike
    required_metrics:
      - kafka_server_brokertopicmetrics_messagesin_total
      - kafka_server_brokertopicmetrics_bytesin_total
      - kafka_server_brokertopicmetrics_bytesout_total
    tags: [kafka, topics, partitions, throughput]
    default_timerange: "4h"
    panels:
      - title: Messages In per Topic
        row: Throughput
        unit: reqps
        queries:
          - expr: 'sum(rate(kafka_server_brokertopicmetrics_messagesin_total[{rate_interval}])) by (topic)'
            legend_format: "{{topic}}"
      - title: Bytes In / Out per Topic
        row: Throughput
        unit: bytes
        queries:
          - expr: 'sum(rate(kafka_server_brokertopicmetrics_bytesin_total[{rate_interval}])) by (topic)'
            legend_format: "in {{topic}}"
          - expr: 'sum(rate(kafka_server_brokertopicmetrics_bytesout_total[{rate_interval}])) by (topic)'
            legend_format: "out {{topic}}"
      - title: Partition Message Rate (Hotspot Detection)
        row: Partitions
        unit: reqps
        queries:
          - expr: 'rate(kafka_log_log_logendoffset[{rate_interval}])'
            legend_format: "{{topic}}-{{partition}}"
      - title: Average Message Size
        row: Messages
        unit: bytes
        queries:
          - expr: 'sum(rate(kafka_server_brokertopicmetrics_bytesin_total[{rate_interval}])) by (topic) / sum(rate(kafka_server_brokertopicmetrics_messagesin_total[{rate_interval}])) by (topic)'
            legend_format: "{{topic}}"
      - title: Log End Offset Growth
        row: Partitions
        unit: short
        queries:
          - expr: 'kafka_log_log_logendoffset{{topic!=""}}'
            legend_format: "{{topic}}-{{partition}}"
