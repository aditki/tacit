# DashForge Investigation Archetypes
#
# Engineers: edit this file to add/remove panels, adjust queries, or create new
# archetypes. Changes take effect on next server restart (no code change needed).
#
# Template placeholders:
#   {service_filter}    → e.g. job="checkout-service"
#   {container_filter}  → e.g. container="checkout-service"
#   {rate_interval}     → e.g. 5m
#
# Panel types: timeseries, stat, gauge, table, logs
# Units: reqps, s, bytes, percentunit, short, none

archetypes:

  - id: latency_investigation
    name: Latency Investigation
    description: Diagnose high latency / slow requests for a service
    problem_types:
      - latency_investigation
      - slow_requests
      - high_latency
      - p99_spike
    required_metrics:
      - http_request_duration_seconds
      - http_requests_total
    tags: [latency, performance]
    default_timerange: "1h"
    panels:
      - title: Request Rate
        description: HTTP request throughput by status code
        row: Traffic
        unit: reqps
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}}}[{rate_interval}])) by (status)'
            legend_format: "{{status}}"
      - title: Error Rate (5xx)
        description: Rate of server errors
        row: Errors
        unit: percentunit
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}, status=~"5.."}}[{rate_interval}])) / sum(rate(http_requests_total{{{service_filter}}}[{rate_interval}]))'
            legend_format: error ratio
      - title: P50 / P95 / P99 Latency
        description: Request duration percentiles
        row: Latency
        unit: s
        queries:
          - expr: 'histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le))'
            legend_format: p50
          - expr: 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le))'
            legend_format: p95
          - expr: 'histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le))'
            legend_format: p99
      - title: In-Flight Requests
        description: Current request concurrency (saturation signal)
        row: Saturation
        queries:
          - expr: 'http_requests_in_flight{{{service_filter}}}'
            legend_format: in-flight
      - title: CPU Usage
        description: Container CPU consumption
        row: Resources
        unit: s
        queries:
          - expr: 'rate(container_cpu_usage_seconds_total{{{container_filter}}}[{rate_interval}])'
            legend_format: cpu
      - title: Memory Usage
        description: Container memory working set
        row: Resources
        unit: bytes
        queries:
          - expr: 'container_memory_working_set_bytes{{{container_filter}}}'
            legend_format: memory

  - id: error_spike
    name: Error Spike Investigation
    description: Diagnose a spike in errors / 5xx responses
    problem_types:
      - error_spike
      - 5xx_errors
      - error_rate
      - failed_requests
    required_metrics:
      - http_requests_total
    tags: [errors, 5xx]
    default_timerange: "30m"
    panels:
      - title: Error Rate Over Time
        description: 5xx error rate as a ratio of total requests
        row: Errors
        unit: reqps
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}, status=~"5.."}}[{rate_interval}]))'
            legend_format: 5xx rate
          - expr: 'sum(rate(http_requests_total{{{service_filter}}}[{rate_interval}]))'
            legend_format: total rate
      - title: Error Ratio
        description: Percentage of requests returning 5xx
        row: Errors
        panel_type: stat
        unit: percentunit
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}, status=~"5.."}}[{rate_interval}])) / sum(rate(http_requests_total{{{service_filter}}}[{rate_interval}]))'
            legend_format: error ratio
      - title: Errors by Status Code
        description: Breakdown of error responses by HTTP status
        row: Errors
        unit: reqps
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}, status=~"[45].."}}[{rate_interval}])) by (status)'
            legend_format: "{{status}}"
      - title: Errors by Path
        description: Which endpoints are failing
        row: Breakdown
        unit: reqps
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}, status=~"5.."}}[{rate_interval}])) by (path)'
            legend_format: "{{path}}"
      - title: Request Latency During Errors
        description: p95 latency — often spikes correlate with errors
        row: Latency
        unit: s
        queries:
          - expr: 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le))'
            legend_format: p95
      - title: Pod Restarts
        description: Container restarts may indicate crash loops causing errors
        row: Resources
        queries:
          - expr: 'increase(kube_pod_container_restarts_total{{{container_filter}}}[{rate_interval}])'
            legend_format: restarts

  - id: golden_signals
    name: SRE Golden Signals
    description: "The four golden signals: latency, traffic, errors, saturation"
    problem_types:
      - golden_signals
      - sre_overview
      - service_health
      - service_overview
    required_metrics:
      - http_requests_total
      - http_request_duration_seconds
    tags: [golden-signals, sre]
    default_timerange: "1h"
    panels:
      - title: Request Throughput
        description: Total request rate — traffic signal
        row: Traffic
        unit: reqps
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}}}[{rate_interval}])) by (method)'
            legend_format: "{{method}}"
      - title: Request Latency (p50 / p95 / p99)
        description: Duration percentiles — latency signal
        row: Latency
        unit: s
        queries:
          - expr: 'histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le))'
            legend_format: p50
          - expr: 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le))'
            legend_format: p95
          - expr: 'histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le))'
            legend_format: p99
      - title: Error Rate (5xx / total)
        description: Server error ratio — errors signal
        row: Errors
        unit: percentunit
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}, status=~"5.."}}[{rate_interval}])) / sum(rate(http_requests_total{{{service_filter}}}[{rate_interval}]))'
            legend_format: error ratio
      - title: Errors by Status
        description: Error breakdown by HTTP status code
        row: Errors
        unit: reqps
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}, status=~"[45].."}}[{rate_interval}])) by (status)'
            legend_format: "{{status}}"
      - title: In-Flight Requests
        description: Concurrent request count — saturation signal
        row: Saturation
        queries:
          - expr: 'http_requests_in_flight{{{service_filter}}}'
            legend_format: in-flight
      - title: CPU Usage
        description: Container CPU — resource saturation
        row: Saturation
        unit: s
        queries:
          - expr: 'rate(container_cpu_usage_seconds_total{{{container_filter}}}[{rate_interval}])'
            legend_format: cpu
      - title: Memory Usage
        description: Container memory — resource saturation
        row: Saturation
        unit: bytes
        queries:
          - expr: 'container_memory_working_set_bytes{{{container_filter}}}'
            legend_format: memory

  - id: resource_saturation
    name: Resource Saturation Investigation
    description: "Diagnose CPU, memory, or connection pool exhaustion"
    problem_types:
      - resource_saturation
      - high_cpu
      - high_memory
      - oom
      - cpu_throttling
    required_metrics:
      - container_cpu_usage_seconds_total
      - container_memory_working_set_bytes
    tags: [resources, saturation]
    default_timerange: "1h"
    panels:
      - title: CPU Usage
        description: Container CPU consumption rate
        row: CPU
        unit: s
        queries:
          - expr: 'rate(container_cpu_usage_seconds_total{{{container_filter}}}[{rate_interval}])'
            legend_format: "{{container}}"
      - title: Memory Working Set
        description: Active memory usage
        row: Memory
        unit: bytes
        queries:
          - expr: 'container_memory_working_set_bytes{{{container_filter}}}'
            legend_format: "{{container}}"
      - title: Database Connections
        description: Active database connection pool usage
        row: Connections
        queries:
          - expr: 'db_connections_active{{{service_filter}}}'
            legend_format: active
      - title: DB Query Latency
        description: Average database query duration
        row: Connections
        unit: s
        queries:
          - expr: 'rate(db_query_duration_seconds_sum{{{service_filter}}}[{rate_interval}]) / rate(db_query_duration_seconds_count{{{service_filter}}}[{rate_interval}])'
            legend_format: avg query time
      - title: In-Flight Requests
        description: Concurrency pressure
        row: Saturation
        queries:
          - expr: 'http_requests_in_flight{{{service_filter}}}'
            legend_format: in-flight
      - title: Pod Restarts
        description: OOM kills and crash loops
        row: Stability
        queries:
          - expr: 'increase(kube_pod_container_restarts_total{{{container_filter}}}[{rate_interval}])'
            legend_format: restarts
  
  - id: kubernetes_investigation
    name: Kubernetes Cluster Investigation
    description: Diagnose pod instability, scheduling failures, and cluster health issues
    problem_types:
      - kubernetes_investigation
      - pod_instability
      - scheduling_failures
      - crashloopbackoff
      - node_pressure
    required_metrics:
      - kube_pod_status_phase
      - kube_node_status_condition
      - container_cpu_usage_seconds_total
    tags: [kubernetes, cluster, pods]
    default_timerange: "1h"
    panels:
      - title: Pod Restarts
        row: Pods
        unit: short
        queries:
          - expr: 'increase(kube_pod_container_status_restarts_total{{{service_filter}}}[{rate_interval}])'
            legend_format: "{{pod}}"
      - title: CrashLoopBackOff Pods
        row: Pods
        unit: short
        queries:
          - expr: 'kube_pod_container_status_waiting_reason{{reason="CrashLoopBackOff"}}'
            legend_format: "{{pod}}"
      - title: Pending Pods
        row: Scheduling
        unit: short
        queries:
          - expr: 'count(kube_pod_status_phase{{phase="Pending"}}) by (namespace)'
            legend_format: "{{namespace}}"
      - title: Node Pressure Conditions
        row: Nodes
        unit: short
        queries:
          - expr: 'kube_node_status_condition{{status="true",condition=~"MemoryPressure|DiskPressure|PIDPressure"}}'
            legend_format: "{{node}} {{condition}}"

  - id: memory_leak_investigation
    name: Memory Leak Investigation
    description: Detect gradual memory growth and OOM risks
    problem_types:
      - memory_leak
      - oom_kills
      - heap_growth
      - increasing_memory_usage
    required_metrics:
      - container_memory_working_set_bytes
      - process_resident_memory_bytes
      - container_oom_events_total
    tags: [memory, oom, leaks]
    default_timerange: "6h"
    panels:
      - title: Container Memory Usage
        row: Memory
        unit: bytes
        queries:
          - expr: 'container_memory_working_set_bytes{{{container_filter}}}'
            legend_format: "{{pod}}"
      - title: RSS Memory
        row: Memory
        unit: bytes
        queries:
          - expr: 'process_resident_memory_bytes{{{service_filter}}}'
            legend_format: rss
      - title: OOM Events
        row: Failures
        unit: short
        queries:
          - expr: 'increase(container_oom_events_total{{{container_filter}}}[{rate_interval}])'
            legend_format: oom

  - id: api_response_time_spike
    name: API Response Time Spike
    description: Investigate sudden increases in API response latency
    problem_types:
      - api_latency_spike
      - response_time_spike
      - slow_api
      - endpoint_latency
    required_metrics:
      - http_request_duration_seconds
      - http_requests_total
    tags: [api, latency, http]
    default_timerange: "2h"
    panels:
      - title: P95 Latency by Endpoint
        row: Latency
        unit: s
        queries:
          - expr: 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le,path))'
            legend_format: "{{path}}"
      - title: Slowest Endpoints
        row: Breakdown
        unit: s
        queries:
          - expr: 'topk(10, histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le,path)))'
            legend_format: "{{path}}"
      - title: Request Volume
        row: Traffic
        unit: reqps
        queries:
          - expr: 'sum(rate(http_requests_total{{{service_filter}}}[{rate_interval}])) by (path)'
            legend_format: "{{path}}"

  - id: message_queue_backlog
    name: Message Queue Backlog
    description: Diagnose queue growth, consumer lag, and throughput imbalance
    problem_types:
      - queue_backlog
      - kafka_lag
      - sqs_backlog
      - rabbitmq_queue_growth
    required_metrics:
      - kafka_consumer_lag
      - kafka_messages_in_total
      - queue_depth
    tags: [queues, kafka, async]
    default_timerange: "4h"
    panels:
      - title: Consumer Lag
        row: Lag
        unit: short
        queries:
          - expr: 'sum(kafka_consumer_lag{{{service_filter}}}) by (consumer_group)'
            legend_format: "{{consumer_group}}"
      - title: Queue Depth
        row: Queue
        unit: short
        queries:
          - expr: 'queue_depth{{{service_filter}}}'
            legend_format: queue depth
      - title: Producer vs Consumer Throughput
        row: Throughput
        unit: reqps
        queries:
          - expr: 'sum(rate(kafka_messages_in_total[{rate_interval}]))'
            legend_format: produced
          - expr: 'sum(rate(kafka_messages_consumed_total[{rate_interval}]))'
            legend_format: consumed

  - id: dns_certificate_failures
    name: DNS & Certificate Failures
    description: Investigate DNS lookup failures and TLS certificate issues
    problem_types:
      - dns_failures
      - tls_expiry
      - certificate_failures
      - name_resolution_errors
    required_metrics:
      - dns_lookup_failures_total
      - tls_certificate_expiry_timestamp
      - tls_handshake_errors_total
    tags: [dns, tls, certificates]
    default_timerange: "24h"
    panels:
      - title: DNS Lookup Failures
        row: DNS
        unit: short
        queries:
          - expr: 'increase(dns_lookup_failures_total[{rate_interval}])'
            legend_format: failures
      - title: TLS Handshake Errors
        row: TLS
        unit: short
        queries:
          - expr: 'increase(tls_handshake_errors_total[{rate_interval}])'
            legend_format: handshake errors
      - title: Certificate Expiry Countdown
        row: Certificates
        unit: s
        queries:
          - expr: 'tls_certificate_expiry_timestamp - time()'
            legend_format: "{{common_name}}"

  - id: deployment_regression
    name: Deployment Regression
    description: Investigate performance or stability regressions after deployment
    problem_types:
      - deployment_regression
      - release_failure
      - canary_issue
      - rollback_required
    required_metrics:
      - deployment_rollouts_total
      - http_request_duration_seconds
      - http_requests_total
    tags: [deployments, releases, regressions]
    default_timerange: "6h"
    panels:
      - title: Deployment Events
        row: Deployments
        unit: short
        queries:
          - expr: 'increase(deployment_rollouts_total[{rate_interval}])'
            legend_format: rollouts
      - title: Error Rate After Deploy
        row: Errors
        unit: percentunit
        queries:
          - expr: 'sum(rate(http_requests_total{{status=~"5..",{service_filter}}}[{rate_interval}])) / sum(rate(http_requests_total{{{service_filter}}}[{rate_interval}]))'
            legend_format: error ratio
      - title: Latency After Deploy
        row: Latency
        unit: s
        queries:
          - expr: 'histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{{{service_filter}}}[{rate_interval}])) by (le))'
            legend_format: p95


  - id: redis_saturation
    name: Redis Saturation & Cache Stampede
    description: Diagnose Redis saturation, eviction storms, and cache miss spikes
    problem_types:
      - redis_latency
      - cache_stampede
      - redis_saturation
      - cache_miss_spike
    required_metrics:
      - redis_connected_clients
      - redis_evicted_keys_total
      - redis_keyspace_hits_total
      - redis_keyspace_misses_total
    tags: [redis, cache, saturation]
    default_timerange: "2h"
    panels:
      - title: Connected Clients
        row: Connections
        unit: short
        queries:
          - expr: 'redis_connected_clients{{{service_filter}}}'
            legend_format: clients
      - title: Cache Hit Rate
        row: Cache
        unit: percentunit
        queries:
          - expr: 'rate(redis_keyspace_hits_total{{{service_filter}}}[{rate_interval}]) / (rate(redis_keyspace_hits_total{{{service_filter}}}[{rate_interval}]) + rate(redis_keyspace_misses_total{{{service_filter}}}[{rate_interval}]))'
            legend_format: hit rate
      - title: Eviction Rate
        row: Cache
        unit: short
        queries:
          - expr: 'rate(redis_evicted_keys_total{{{service_filter}}}[{rate_interval}])'
            legend_format: evictions/s
      - title: Memory Usage
        row: Resources
        unit: bytes
        queries:
          - expr: 'redis_memory_used_bytes{{{service_filter}}}'
            legend_format: used
          - expr: 'redis_memory_max_bytes{{{service_filter}}}'
            legend_format: max
      - title: Command Latency
        row: Latency
        unit: s
        queries:
          - expr: 'rate(redis_commands_duration_seconds_total{{{service_filter}}}[{rate_interval}]) / rate(redis_commands_processed_total{{{service_filter}}}[{rate_interval}])'
            legend_format: avg latency

  - id: db_connection_pool_exhaustion
    name: Database Connection Pool Exhaustion
    description: Investigate exhausted DB pools, connection waits, and timeout spikes
    problem_types:
      - db_pool_exhaustion
      - connection_timeout
      - db_connection_starvation
    required_metrics:
      - db_connections_active
      - db_connections_waiting
      - db_query_duration_seconds
    tags: [database, postgres, mysql, pools]
    default_timerange: "2h"
    panels:
      - title: Active Connections
        row: Pool
        unit: short
        queries:
          - expr: 'db_connections_active{{{service_filter}}}'
            legend_format: active
      - title: Waiting Connections
        row: Pool
        unit: short
        queries:
          - expr: 'db_connections_waiting{{{service_filter}}}'
            legend_format: waiting
      - title: Pool Utilization
        row: Pool
        unit: percentunit
        queries:
          - expr: 'db_connections_active{{{service_filter}}} / db_connections_max{{{service_filter}}}'
            legend_format: utilization
      - title: Query Latency
        row: Latency
        unit: s
        queries:
          - expr: 'rate(db_query_duration_seconds_sum{{{service_filter}}}[{rate_interval}]) / rate(db_query_duration_seconds_count{{{service_filter}}}[{rate_interval}])'
            legend_format: avg query time

  - id: kubernetes_networking
    name: Kubernetes Networking & Service Mesh
    description: Diagnose CNI issues, DNS failures, and service mesh latency
    problem_types:
      - cni_failures
      - service_mesh_latency
      - pod_networking
      - kube_dns_failures
    required_metrics:
      - coredns_dns_requests_total
      - istio_request_duration_milliseconds
      - container_network_receive_errors_total
    tags: [kubernetes, networking, istio]
    default_timerange: "1h"
    panels:
      - title: CoreDNS Request Rate
        row: DNS
        unit: reqps
        queries:
          - expr: 'sum(rate(coredns_dns_requests_total[{rate_interval}])) by (type)'
            legend_format: "{{type}}"
      - title: CoreDNS Errors
        row: DNS
        unit: reqps
        queries:
          - expr: 'sum(rate(coredns_dns_responses_total{{rcode=~"SERVFAIL|NXDOMAIN"}}[{rate_interval}])) by (rcode)'
            legend_format: "{{rcode}}"
      - title: Network Receive Errors
        row: Network
        unit: short
        queries:
          - expr: 'rate(container_network_receive_errors_total{{{container_filter}}}[{rate_interval}])'
            legend_format: "{{pod}}"
      - title: Network Transmit Errors
        row: Network
        unit: short
        queries:
          - expr: 'rate(container_network_transmit_errors_total{{{container_filter}}}[{rate_interval}])'
            legend_format: "{{pod}}"
      - title: Istio Request Latency
        row: Service Mesh
        unit: s
        queries:
          - expr: 'histogram_quantile(0.95, sum(rate(istio_request_duration_milliseconds_bucket{{{service_filter}}}[{rate_interval}])) by (le)) / 1000'
            legend_format: p95

  - id: ingress_load_balancer_failures
    name: Ingress & Load Balancer Failures
    description: Investigate ingress controller failures and LB instability
    problem_types:
      - ingress_failures
      - alb_5xx
      - nginx_ingress_errors
      - load_balancer_latency
    required_metrics:
      - nginx_ingress_controller_requests
      - aws_alb_httpcode_elb_5xx
      - request_duration_seconds
    tags: [ingress, loadbalancer, nginx, alb]
    default_timerange: "2h"
    panels:
      - title: Ingress Request Rate
        row: Traffic
        unit: reqps
        queries:
          - expr: 'sum(rate(nginx_ingress_controller_requests{{{service_filter}}}[{rate_interval}])) by (status)'
            legend_format: "{{status}}"
      - title: Ingress 5xx Rate
        row: Errors
        unit: reqps
        queries:
          - expr: 'sum(rate(nginx_ingress_controller_requests{{status=~"5.."}}[{rate_interval}]))'
            legend_format: 5xx
      - title: Ingress Latency
        row: Latency
        unit: s
        queries:
          - expr: 'histogram_quantile(0.95, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket[{rate_interval}])) by (le))'
            legend_format: p95
      - title: Upstream Connection Errors
        row: Errors
        unit: short
        queries:
          - expr: 'sum(rate(nginx_ingress_controller_nginx_process_connections{{state="waiting"}}[{rate_interval}]))'
            legend_format: waiting connections

  - id: autoscaling_instability
    name: Autoscaling Instability
    description: Diagnose HPA thrashing and scaling oscillations
    problem_types:
      - autoscaling_flaps
      - hpa_instability
      - scale_oscillation
    required_metrics:
      - kube_horizontalpodautoscaler_status_current_replicas
      - kube_horizontalpodautoscaler_status_desired_replicas
      - cpu_usage_seconds_total
    tags: [autoscaling, hpa, kubernetes]
    default_timerange: "4h"
    panels:
      - title: Current vs Desired Replicas
        row: HPA
        unit: short
        queries:
          - expr: 'kube_horizontalpodautoscaler_status_current_replicas{{{service_filter}}}'
            legend_format: current
          - expr: 'kube_horizontalpodautoscaler_status_desired_replicas{{{service_filter}}}'
            legend_format: desired
      - title: HPA Min / Max Bounds
        row: HPA
        unit: short
        queries:
          - expr: 'kube_horizontalpodautoscaler_spec_min_replicas{{{service_filter}}}'
            legend_format: min
          - expr: 'kube_horizontalpodautoscaler_spec_max_replicas{{{service_filter}}}'
            legend_format: max
      - title: CPU Utilization vs Target
        row: Resources
        unit: percentunit
        queries:
          - expr: 'sum(rate(container_cpu_usage_seconds_total{{{container_filter}}}[{rate_interval}])) / sum(kube_pod_container_resource_requests{{resource="cpu",{container_filter}}})'
            legend_format: actual
          - expr: 'kube_horizontalpodautoscaler_spec_target_metric{{{service_filter}}}'
            legend_format: target

  - id: threadpool_starvation
    name: Thread Pool Starvation & Deadlocks
    description: Investigate worker exhaustion and blocked execution pools
    problem_types:
      - threadpool_starvation
      - deadlocks
      - worker_exhaustion
    required_metrics:
      - process_threads
      - threadpool_queue_depth
      - request_queue_depth
    tags: [threads, java, concurrency]
    default_timerange: "2h"
    panels:
      - title: Thread Count
        row: Threads
        unit: short
        queries:
          - expr: 'process_threads{{{service_filter}}}'
            legend_format: threads
      - title: Thread Pool Queue Depth
        row: Queues
        unit: short
        queries:
