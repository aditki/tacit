<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DashForge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e4e6eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #6366f1, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #9ca3af; font-size: 0.9rem; margin-bottom: 2rem; }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3040;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 640px;
    }
    textarea {
      width: 100%;
      min-height: 100px;
      background: #0f1117;
      border: 1px solid #3b3f54;
      border-radius: 8px;
      color: #e4e6eb;
      padding: 0.75rem;
      font-size: 0.95rem;
      resize: vertical;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: #6366f1; }
    textarea::placeholder { color: #6b7280; }
    .actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-secondary { background: #2d3040; color: #9ca3af; }
    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 1rem;
    }
    .example-chip {
      background: #2d3040;
      border: 1px solid #3b3f54;
      border-radius: 20px;
      padding: 0.35rem 0.75rem;
      font-size: 0.8rem;
      color: #9ca3af;
      cursor: pointer;
      transition: all 0.15s;
    }
    .example-chip:hover { border-color: #6366f1; color: #c7d2fe; }
    .result {
      margin-top: 1.5rem;
      width: 100%;
      max-width: 640px;
    }
    .result-card {
      background: #1a1d27;
      border: 1px solid #2d3040;
      border-radius: 12px;
      padding: 1.25rem;
      margin-top: 0.5rem;
    }
    .result-card.error { border-color: #ef4444; }
    .result-card.success { border-color: #22c55e; }
    .result-label { font-size: 0.75rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .result-url a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
    }
    .result-url a:hover { text-decoration: underline; }
    .result-meta { font-size: 0.85rem; color: #9ca3af; margin-top: 0.5rem; line-height: 1.5; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #3b3f54;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { margin-top: 0.75rem; font-size: 0.85rem; color: #9ca3af; }
  </style>
</head>
<body>
  <h1>DashForge</h1>
  <p class="subtitle">Natural language &rarr; Grafana dashboards</p>

  <div class="card">
    <textarea id="prompt" placeholder="Describe the dashboard you need...&#10;&#10;e.g. High 5xx error rate on checkout-service in the last 30 minutes"></textarea>
    <div class="actions">
      <button class="btn-primary" id="generate" onclick="submit()">Generate Dashboard</button>
      <button class="btn-secondary" onclick="document.getElementById('prompt').value=''">Clear</button>
    </div>
    <div class="examples">
      <span class="example-chip" onclick="fill(this)">5xx errors on checkout-service</span>
      <span class="example-chip" onclick="fill(this)">High latency on payment-api last 1h</span>
      <span class="example-chip" onclick="fill(this)">CPU and memory overview for all services</span>
      <span class="example-chip" onclick="fill(this)">Database connection pool and query latency</span>
    </div>
  </div>

  <div class="result" id="result"></div>

  <script>
    const API_URL = window.location.origin + '/api/v1/chart';

    function fill(el) {
      document.getElementById('prompt').value = el.textContent;
    }

    async function submit() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;

      const btn = document.getElementById('generate');
      const result = document.getElementById('result');

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Generating...';
      result.innerHTML = '<div class="status"><span class="spinner"></span>Running pipeline &mdash; this takes 15-30s...</div>';

      try {
        const resp = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, user_id: 'web-ui', channel_id: 'web' }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: resp.statusText }));
          throw new Error(err.detail || `HTTP ${resp.status}`);
        }

        const data = await resp.json();

        // Replace localhost URL with current origin's host for Grafana link
        const dashUrl = data.dashboard_url.replace('http://localhost:3000', 'http://' + window.location.hostname + ':3000');

        result.innerHTML = `
          <div class="result-card success">
            <div class="result-label">Dashboard created</div>
            <div class="result-url"><a href="${dashUrl}" target="_blank">${data.dashboard_uid} &mdash; Open in Grafana &rarr;</a></div>
            <div class="result-meta">
              <strong>${data.panel_count}</strong> panels<br>
              ${data.summary.replace(/\n/g, '<br>')}
            </div>
          </div>
        `;
      } catch (e) {
        result.innerHTML = `
          <div class="result-card error">
            <div class="result-label">Error</div>
            <div class="result-meta" style="color:#fca5a5">${e.message}</div>
          </div>
        `;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Dashboard';
      }
    }

    // Submit on Ctrl+Enter
    document.getElementById('prompt').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submit();
    });
  </script>
</body>
</html>
