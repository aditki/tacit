name: Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: tacit-linux-x86_64
            binary: dist/tacit
            package: tacit-linux-x86_64.tar.gz
          - os: macos-latest
            artifact: tacit-macos-arm64
            binary: dist/tacit
            package: tacit-macos-arm64.tar.gz
          - os: windows-latest
            artifact: tacit-windows-x86_64
            binary: dist/tacit.exe
            package: tacit-windows-x86_64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-extras --dev
      - name: Build binary
        run: uv run pyinstaller tacit.spec --clean --noconfirm
      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "${{ matrix.binary }}" tacit.exe
            7z a "${{ matrix.package }}" tacit.exe
          else
            cp "${{ matrix.binary }}" tacit
            chmod 755 tacit
            tar -czf "${{ matrix.package }}" tacit
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.package }}

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
