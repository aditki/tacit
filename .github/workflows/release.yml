name: Release (PyPI + ghcr)

# Publishes on version tags (v0.2.0, v1.0.0, ...):
#   1. sdist + wheel → PyPI, so `pip install tacit-ai` /
#      `uvx --from tacit-ai tacit` work
#   2. multi-arch Docker image → ghcr.io/<owner>/tacit, so the demo stack
#      runs without a local build
#
# One-time setup:
#   - PyPI: add a pending trusted publisher for project `tacit-ai` at
#     https://pypi.org/manage/account/publishing/
#     (no API token secret needed — uses OIDC).
#   - ghcr: works out of the box with GITHUB_TOKEN; make the package public
#     in the repo's Packages settings after the first push.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: uv build
      - name: Smoke-test the wheel
        run: |
          uv venv .smoke-venv
          uv pip install --python .smoke-venv/bin/python dist/*.whl
          .smoke-venv/bin/tacit --version
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build-dist
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tacit-ai/
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  scan-ghcr-image:
    needs: build-dist
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.platform }} image for vulnerability scan
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=docker,dest=/tmp/tacit-release-scan-${{ matrix.arch }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run Trivy vulnerability scan for ${{ matrix.platform }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/tacit-release-scan-${{ matrix.arch }}.tar
          scanners: vuln
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

  publish-ghcr:
    needs:
      - build-dist
      - scan-ghcr-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Classify release tag
        id: release_tag
        shell: python
        run: |
          import os
          import re

          tag = os.environ.get("GITHUB_REF_NAME", "")
          ref = os.environ.get("GITHUB_REF", "")
          version = tag[1:] if tag.startswith("v") else tag
          pep440_prerelease = re.compile(
              r"(?:^|[0-9._-])(?:a|alpha|b|beta|c|rc|pre|preview|dev)\.?\d*",
              re.IGNORECASE,
          )
          is_stable_tag = ref.startswith("refs/tags/v") and not pep440_prerelease.search(version)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"is_stable_tag={str(is_stable_tag).lower()}\n")
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tacit
          flavor: |
            latest=false
          tags: |
            type=pep440,pattern={{version}}
            type=pep440,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ steps.release_tag.outputs.is_stable_tag == 'true' }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
