name: Release (PyPI + ghcr)

# Publishes on version tags (v0.2.0, v1.0.0, ...):
#   1. sdist + wheel → PyPI, so `pip install tacit` / `uvx tacit` work
#   2. multi-arch Docker image → ghcr.io/<owner>/tacit, so the demo stack
#      runs without a local build
#
# One-time setup:
#   - PyPI: add a "trusted publisher" for this repo/workflow at
#     https://pypi.org/manage/project/tacit/settings/publishing/
#     (no API token secret needed — uses OIDC).
#   - ghcr: works out of the box with GITHUB_TOKEN; make the package public
#     in the repo's Packages settings after the first push.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: uv build
      - name: Smoke-test the wheel
        run: |
          uv venv .smoke-venv
          uv pip install --python .smoke-venv/bin/python dist/*.whl
          .smoke-venv/bin/tacit --version
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build-dist
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/tacit
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
